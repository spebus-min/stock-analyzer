<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SHOCKSHOCKSTOCK</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#f5f3ee;
  --surface:#ffffff;
  --surface2:#f0ede6;
  --border:#e2ddd5;
  --border2:#ccc8c0;
  --text:#1a1814;
  --text2:#5c5852;
  --text3:#9c9890;
  --accent:#1a6b4a;
  --accent-light:#e8f5ee;
  --red:#c0392b;
  --mono:'DM Mono', monospace;
  --sans:'Noto Sans TC', sans-serif;
}

body{
  font-family:var(--sans);
  background-image:url('https://images.unsplash.com/photo-1526304640581-d334cdbbf45e?q=80&w=1170&auto=format&fit=crop');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  min-height:100vh;
}

header{
  background:#111;
  color:#fff;
  padding:1.5rem 2rem;
  border-bottom:2px solid var(--accent);
}

header h1{
  font-size:1.2rem;
  font-family:var(--mono);
}

main{
  max-width:900px;
  margin:auto;
  padding:2rem 1rem;
}

.search-wrap{
  background:white;
  padding:2rem;
  border:1px solid var(--border);
}

.search-label{
  font-size:.8rem;
  margin-bottom:.8rem;
  color:#777;
}

.search-row{
  display:flex;
}

.search-row input{
  flex:1;
  padding:1rem;
  border:1px solid #ccc;
  font-size:1.1rem;
}

.search-row button{
  width:120px;
  border:none;
  background:var(--accent);
  color:white;
  cursor:pointer;
  font-size:1rem;
}

.search-row button:hover{
  opacity:.9;
}

.chips{
  margin-top:1rem;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.chip{
  padding:6px 12px;
  border:1px solid #ccc;
  background:white;
  cursor:pointer;
}

#loading-ui{
  display:none;
  background:white;
  padding:2rem;
  margin-top:1rem;
  border:1px solid var(--border);
}

#content-ui{
  display:none;
  margin-top:1rem;
}

.stock-hero{
  background:#111;
  color:white;
  padding:2rem;
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:1rem;
}

.name{
  font-size:2rem;
  font-weight:700;
}

.code{
  color:#aaa;
  margin-bottom:8px;
}

.price-main{
  font-size:2.2rem;
  font-family:var(--mono);
}

.price-change{
  margin-top:8px;
}

.pos{
  color:#5dba82;
}

.neg{
  color:#ff6b6b;
}

.metrics-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:1px;
  background:#ddd;
  margin-top:1rem;
}

.metric{
  background:white;
  padding:1rem;
}

.metric-label{
  font-size:.75rem;
  color:#777;
  margin-bottom:8px;
}

.metric-value{
  font-size:1.4rem;
  font-family:var(--mono);
}

.section{
  margin-top:1rem;
  background:white;
  border:1px solid var(--border);
}

.section-header{
  padding:1rem;
  background:var(--surface2);
  border-bottom:1px solid var(--border);
  font-size:.8rem;
  color:#666;
}

.section-body{
  padding:1.5rem;
}

.overview-text{
  line-height:1.9;
}

.fin-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1rem;
}

.fin-row{
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #eee;
  padding:.7rem 0;
}

.error-box{
  background:#fff5f5;
  color:#c0392b;
  border:1px solid #ffcccc;
  padding:1rem;
  margin-top:1rem;
}

#chart-wrap{
  height:300px;
}

.source-note{
  margin-top:1rem;
  font-size:.8rem;
  color:#666;
  line-height:1.8;
}

@media(max-width:768px){

  .search-row{
    flex-direction:column;
  }

  .search-row button{
    width:100%;
    height:50px;
  }

  .fin-grid{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<header>
  <h1>SHOCKSHOCKSTOCK</h1>
</header>

<main>

<div class="search-wrap">

  <div class="search-label">
    輸入股票名稱或代碼
  </div>

  <div class="search-row">
    <input
      type="text"
      id="stock-input"
      placeholder="例如：2330 或 台積電"
    />

    <button onclick="startAnalysis()">
      分析
    </button>
  </div>

  <div class="chips">
    <button class="chip" onclick="quickSearch('2330 台積電')">2330 台積電</button>
    <button class="chip" onclick="quickSearch('2317 鴻海')">2317 鴻海</button>
    <button class="chip" onclick="quickSearch('2454 聯發科')">2454 聯發科</button>
    <button class="chip" onclick="quickSearch('2412 中華電信')">2412 中華電信</button>
  </div>

</div>

<div id="loading-ui">
  AI 正在分析股票資料中...
</div>

<div id="content-ui"></div>

</main>

<script>

/* =======================================================
   1. 把這裡換成你的 Gemini API KEY
======================================================= */

const GEMINI_API_KEY = 'AIzaSyAt_nA8nFZFOGcI0qS8nVAWpJv0defRnyU';


/* =======================================================
   2. 快速搜尋
======================================================= */

function quickSearch(v){
  document.getElementById('stock-input').value = v;
  startAnalysis();
}


/* =======================================================
   3. Enter 搜尋
======================================================= */

document
.getElementById('stock-input')
.addEventListener('keydown', e => {

  if(e.key === 'Enter'){
    startAnalysis();
  }

});


/* =======================================================
   4. 主分析功能
======================================================= */

let chartInstance = null;

async function startAnalysis(){

  const input = document
    .getElementById('stock-input')
    .value
    .trim();

  if(!input) return;

  const loadingUI = document.getElementById('loading-ui');
  const contentUI = document.getElementById('content-ui');

  loadingUI.style.display = 'block';
  contentUI.style.display = 'none';
  contentUI.innerHTML = '';

  if(chartInstance){
    chartInstance.destroy();
  }

  const systemPrompt = `
你是台灣股票分析師。

請根據使用者輸入，
生成一份股票分析 JSON。

不要 markdown。
不要說明。
不要 \`\`\`json。

格式：

{
  "code":"2330",
  "name":"台積電",
  "industry":"半導體",
  "market":"上市",
  "overview":"公司介紹",
  "currentPrice":950,
  "priceChange":12,
  "priceChangePct":1.2,
  "pe":25,
  "pb":6,
  "dividendYield":2.4,
  "eps":38.5,
  "marketCap":"24兆",
  "revenue":"2.8兆",
  "roe":32,
  "debtRatio":28,
  "analystView":"分析師觀點",
  "priceHistory":{
    "labels":["1月","2月","3月","4月","5月","6月"],
    "prices":[800,820,840,860,900,950]
  },
  "sources":["Gemini AI"],
  "note":"AI 生成內容僅供參考",
  "dataDate":"2025"
}
`;

  try{

    /* =======================================================
       5. 呼叫 Gemini API
    ======================================================= */

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`,
      {
        method:'POST',

        headers:{
          'Content-Type':'application/json'
        },

        body:JSON.stringify({

          contents:[
            {
              parts:[
                {
                  text:
`${systemPrompt}

分析台灣股票：

${input}`
                }
              ]
            }
          ],

          generationConfig:{
            temperature:0.4,
            maxOutputTokens:2048,
            responseMimeType:"application/json"
          }

        })

      }
    );


    /* =======================================================
       6. 錯誤檢查
    ======================================================= */

    if(!res.ok){

      const errText = await res.text();

      console.log(errText);

      throw new Error(
        `Gemini API 錯誤 (${res.status})`
      );

    }


    /* =======================================================
       7. 解析 Gemini 回傳
    ======================================================= */

    const data = await res.json();

    console.log(data);

    const raw =
      data.candidates?.[0]?.content?.parts?.[0]?.text;

    if(!raw){
      throw new Error('Gemini 沒有回傳內容');
    }

    const d = JSON.parse(raw);


    /* =======================================================
       8. 顯示報告
    ======================================================= */

    renderReport(d);

    loadingUI.style.display = 'none';

    contentUI.style.display = 'block';

  }

  catch(err){

    console.error(err);

    loadingUI.style.display = 'none';

    contentUI.style.display = 'block';

    contentUI.innerHTML = `
      <div class="error-box">
        ⚠ 分析失敗：${err.message}
      </div>
    `;
  }

}


/* =======================================================
   9. 渲染報告
======================================================= */

function renderReport(d){

  const pos = d.priceChange >= 0;

  const sign = pos ? '+' : '';

  const cls = pos ? 'pos' : 'neg';

  document.getElementById('content-ui').innerHTML = `

    <div class="stock-hero">

      <div>

        <div class="code">
          ${d.code} · ${d.market} · ${d.industry}
        </div>

        <div class="name">
          ${d.name}
        </div>

      </div>

      <div>

        <div class="price-main">
          $${Number(d.currentPrice).toLocaleString()}
        </div>

        <div class="price-change ${cls}">
          ${sign}${d.priceChange}
          (${sign}${d.priceChangePct}%)
        </div>

      </div>

    </div>


    <div class="metrics-grid">

      <div class="metric">
        <div class="metric-label">P/E</div>
        <div class="metric-value">${d.pe}</div>
      </div>

      <div class="metric">
        <div class="metric-label">殖利率</div>
        <div class="metric-value">${d.dividendYield}%</div>
      </div>

      <div class="metric">
        <div class="metric-label">ROE</div>
        <div class="metric-value">${d.roe}%</div>
      </div>

      <div class="metric">
        <div class="metric-label">EPS</div>
        <div class="metric-value">${d.eps}</div>
      </div>

    </div>


    <div class="section">

      <div class="section-header">
        公司介紹
      </div>

      <div class="section-body">

        <div class="overview-text">
          ${d.overview}
        </div>

      </div>

    </div>


    <div class="section">

      <div class="section-header">
        AI 分析觀點
      </div>

      <div class="section-body">

        ${d.analystView}

      </div>

    </div>


    <div class="section">

      <div class="section-header">
        股價趨勢
      </div>

      <div class="section-body">

        <div id="chart-wrap">
          <canvas id="price-chart"></canvas>
        </div>

      </div>

    </div>


    <div class="source-note">

      資料來源：
      ${(d.sources || []).join('、')}

      <br><br>

      ${d.note}

    </div>

  `;

  drawChart(d.priceHistory);

}


/* =======================================================
   10. 畫圖
======================================================= */

function drawChart(h){

  if(!h) return;

  const ctx = document.getElementById('price-chart');

  chartInstance = new Chart(ctx, {

    type:'line',

    data:{

      labels:h.labels,

      datasets:[{

        data:h.prices,

        borderColor:'#1a6b4a',

        backgroundColor:'rgba(26,107,74,0.1)',

        fill:true,

        tension:0.3

      }]

    },

    options:{

      responsive:true,

      maintainAspectRatio:false,

      plugins:{
        legend:{
          display:false
        }
      }

    }

  });

}

</script>

</body>
</html>
